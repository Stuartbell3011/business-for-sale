<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 15px;
      font-weight: 700;
    }
    .status {
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
    }
    .status.info { display: block; background: #eff6ff; color: #1e40af; }
    .status.success { display: block; background: #f0fdf4; color: #166534; }
    .status.error { display: block; background: #fef2f2; color: #991b1b; }
    .extracted {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: none;
      font-size: 12px;
    }
    .extracted.visible { display: block; }
    .extracted .row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }
    .extracted .label { color: #6b7280; }
    .extracted .value { font-weight: 600; }
    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: #1a1a1a; color: white; }
    .btn-success { background: #16a34a; color: white; margin-top: 8px; }
    .btn-outline { background: white; color: #1a1a1a; border: 1px solid #e5e7eb; margin-top: 8px; }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer {
      margin-top: 12px;
      font-size: 11px;
      color: #9ca3af;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Next Owner Importer</h1>
  </div>

  <div id="status" class="status"></div>

  <div id="extracted" class="extracted">
    <div class="row"><span class="label">Title</span><span class="value" id="ex-title"></span></div>
    <div class="row"><span class="label">Industry</span><span class="value" id="ex-industry"></span></div>
    <div class="row"><span class="label">Price</span><span class="value" id="ex-price"></span></div>
    <div class="row"><span class="label">Revenue</span><span class="value" id="ex-revenue"></span></div>
    <div class="row"><span class="label">Profit</span><span class="value" id="ex-profit"></span></div>
    <div class="row"><span class="label">City</span><span class="value" id="ex-city"></span></div>
    <div class="row"><span class="label">Employees</span><span class="value" id="ex-employees"></span></div>
  </div>

  <button id="scrapeBtn" class="btn btn-primary" onclick="scrape()">
    Import This Page
  </button>

  <button id="saveBtn" class="btn btn-success" style="display:none" onclick="save()">
    Save to Next Owner
  </button>

  <button id="openBtn" class="btn btn-outline" style="display:none" onclick="openApp()">
    Open Next Owner
  </button>

  <div class="footer">Works on any business listing page</div>

  <script src="popup.js"></script>
</body>
</html>
